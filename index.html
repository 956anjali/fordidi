<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday</title>

<!-- Same font as index.html -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Same background style as index.html */
body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#ffeff7;
    font-family:'Dancing Script', cursive;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Countdown Page */
#countdownPage{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffeff7;
}

/* Countdown Number */
#countNumber{
    font-size:180px;
    color:#ffffff;
    font-weight:bold;
    text-shadow:0 0 20px rgba(255,20,147,0.3);
}

/* Birthday Page */
#birthdayPage{
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    background:#ffeff7;
    position:relative;
}

/* Birthday Text */
#birthdayText{
    font-size:80px;
    color:#ffffff;
    font-weight:bold;
    white-space:nowrap;
    position:absolute;
    left:-100%;
    animation:slideCenter 4s ease forwards;
    text-shadow:0 0 20px rgba(255,20,147,0.3);
}

/* Animation */
@keyframes slideCenter{
    from{
        left:-100%;
    }
    to{
        left:50%;
        transform:translateX(-50%);
    }
}

</style>
</head>

<body>

<!-- Countdown -->
<div id="countdownPage">
    <div id="countNumber">3</div>
</div>

<!-- Birthday Page -->
<div id="birthdayPage">
    <div id="birthdayText"> READY FOR THE SURPRISE??.
    <br
    <div id="birthdayText">LETS GOOOO 🏃🏻‍♀️💨</div>
</div>

<script>

let count = 3;
const counter = document.getElementById("countNumber");

let interval = setInterval(() => {

    count--;
    counter.textContent = count;

    if(count === 0){

        clearInterval(interval);

        document.getElementById("countdownPage").style.display = "none";

        document.getElementById("birthdayPage").style.display = "flex";

        // Open index.html after 15 seconds
        setTimeout(() => {
            window.location.href = "index2.html";
        }, 8000);
    }

},1000);

</script>

</body>
</html>
